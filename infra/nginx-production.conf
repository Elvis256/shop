# Nginx Production Configuration for PleasureZone
# Copy to: /etc/nginx/sites-available/shop
# Symlink: ln -s /etc/nginx/sites-available/shop /etc/nginx/sites-enabled/
# Test: nginx -t && systemctl reload nginx

# Cache zone for API responses
proxy_cache_path /var/cache/nginx/shop levels=1:2 keys_zone=shop_cache:20m max_size=1g inactive=60m use_temp_path=off;

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

# Backend upstream — matches PM2 cluster instances on port 4000
upstream backend {
    least_conn;
    server 127.0.0.1:4000;
    keepalive 32;
}

# Frontend upstream — PM2 cluster instances on port 5000
upstream frontend {
    least_conn;
    server 127.0.0.1:5000;
    keepalive 16;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name ugsex.com www.ugsex.com;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ugsex.com www.ugsex.com;

    # SSL certificates (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/ugsex.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ugsex.com/privkey.pem;

    # SSL optimization
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # Brotli compression (if module available)
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml image/svg+xml;

    # Client body size (for file uploads)
    client_max_body_size 10m;

    # --- Static files with long cache ---
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif|woff|woff2|ttf|eot|css|js)$ {
        proxy_pass http://frontend;
        proxy_cache shop_cache;
        proxy_cache_valid 200 7d;
        proxy_cache_valid 404 1m;
        add_header X-Cache-Status $upstream_cache_status;
        add_header Cache-Control "public, max-age=604800, immutable";
        expires 7d;
    }

    # --- SEO files (robots.txt, sitemap, llms.txt) ---
    location ~ ^/(robots\.txt|sitemap\.xml|llms\.txt|llms-full\.txt)$ {
        proxy_pass http://frontend;
        proxy_cache shop_cache;
        proxy_cache_valid 200 1h;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # --- API routes with rate limiting ---
    location /api/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- API routes with caching for read-heavy endpoints ---
    location /api/products {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache GET requests for product listings
        proxy_cache shop_cache;
        proxy_cache_valid 200 5m;
        proxy_cache_methods GET;
        proxy_cache_key "$request_uri";
        proxy_cache_bypass $http_authorization $cookie_auth_token;
        add_header X-Cache-Status $upstream_cache_status;
    }

    location /api/categories {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache shop_cache;
        proxy_cache_valid 200 30m;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # --- All other API routes ---
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # --- Uploads ---
    location /uploads/ {
        proxy_pass http://backend;
        proxy_cache shop_cache;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000";
        add_header X-Content-Type-Options nosniff;
    }

    # --- Health checks (no caching) ---
    location /health {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # --- Frontend (Next.js) ---
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # --- Error pages ---
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
