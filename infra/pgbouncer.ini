; PgBouncer Configuration for PleasureZone
; Install: apt install pgbouncer
; Copy to: /etc/pgbouncer/pgbouncer.ini
; Manages connection pooling between application and PostgreSQL

[databases]
; Connect to local PostgreSQL — update password and dbname as needed
shop = host=127.0.0.1 port=5432 dbname=shop auth_user=shop_user

[pgbouncer]
; Listen on port 6432 (different from PostgreSQL 5432)
listen_addr = 127.0.0.1
listen_port = 6432

; Authentication
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; Pool mode: transaction — connections returned after each transaction
; Best for Prisma which uses short-lived transactions
pool_mode = transaction

; Connection limits
max_client_conn = 1000        ; Max client connections to pgbouncer
default_pool_size = 25        ; Connections per user/database pair
min_pool_size = 5             ; Minimum idle connections kept open
reserve_pool_size = 10        ; Extra connections for burst traffic
reserve_pool_timeout = 3      ; Seconds before using reserve pool

; Timeouts
server_connect_timeout = 5    ; Timeout connecting to PostgreSQL
server_idle_timeout = 300     ; Close idle server connections after 5 min
client_idle_timeout = 3600    ; Close idle client connections after 1 hour
query_timeout = 30            ; Kill queries running longer than 30s
query_wait_timeout = 60       ; Max time to wait for available connection

; Logging
log_connections = 0           ; Don't log every connection (noisy)
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60             ; Stats logged every 60 seconds

; Admin
admin_users = shop_admin
stats_users = shop_admin

; Process
pidfile = /var/run/pgbouncer/pgbouncer.pid
logfile = /var/log/pgbouncer/pgbouncer.log

; DNS
dns_max_ttl = 60

; TLS (enable if PostgreSQL uses SSL)
; server_tls_sslmode = prefer
; server_tls_ca_file = /etc/ssl/certs/ca-certificates.crt
