# Redis Sentinel Configuration for PleasureZone
# Install: Redis already includes sentinel
# Run: redis-sentinel /etc/redis/sentinel.conf
# Provides automatic failover if Redis primary goes down

# Sentinel port (different from Redis 6379)
port 26379
daemonize yes
pidfile /var/run/redis/redis-sentinel.pid
logfile /var/log/redis/redis-sentinel.log

# Monitor the primary Redis instance
# sentinel monitor <master-name> <ip> <port> <quorum>
# quorum = number of sentinels needed to agree primary is down
sentinel monitor shop-redis 127.0.0.1 6379 2

# Password for Redis (uncomment and set if auth is enabled)
# sentinel auth-pass shop-redis your_redis_password

# How long before considering primary as down (milliseconds)
sentinel down-after-milliseconds shop-redis 5000

# Max time for failover to complete
sentinel failover-timeout shop-redis 60000

# How many replicas to reconfigure at once during failover
sentinel parallel-syncs shop-redis 1

# Deny access to dangerous commands
sentinel deny-scripts-reconfig yes

# Notification script (optional — alert via Telegram/email)
# sentinel notification-script shop-redis /opt/shop/scripts/sentinel-notify.sh
